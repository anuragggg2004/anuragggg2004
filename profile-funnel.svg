<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <!-- Background Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.025)" stroke-width="1"/>
    </pattern>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070c" />
      <stop offset="100%" stop-color="#0c0e18" />
    </linearGradient>
    <linearGradient id="blue-to-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="purple-to-pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="pink-to-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#22d3a0" />
    </linearGradient>
    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Styles */
    .funnel-stage {
      stroke-width: 1.5;
      fill-opacity: 0.03;
      transition: all 0.3s;
    }
    .funnel-stage:hover {
      fill-opacity: 0.12;
      filter: url(#glow);
    }
    .card {
      transition: all 0.3s ease;
    }
    .card:hover {
      filter: url(#glow);
      stroke-width: 2;
    }
    .flow-particle {
      animation: flow 3s linear infinite;
    }
    .flow-line {
      stroke-dasharray: 6, 6;
      animation: dash 2s linear infinite;
    }
    .connector {
      stroke-dasharray: 4, 4;
      animation: connector-glow 4s infinite ease-in-out;
    }
    .floating-card-1 { animation: float-1 6s infinite ease-in-out; }
    .floating-card-2 { animation: float-2 6s infinite ease-in-out 1.5s; }
    .floating-card-3 { animation: float-3 6s infinite ease-in-out 3s; }
    .pulse-dot { animation: pulse 2s infinite ease-in-out; }

    @keyframes dash {
      to {
        stroke-dashoffset: -20;
      }
    }
    @keyframes connector-glow {
      0%, 100% { stroke: rgba(255, 255, 255, 0.15); }
      50% { stroke: #8b5cf6; }
    }
    @keyframes float-1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(0, -6px); }
    }
    @keyframes float-2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(0, -8px); }
    }
    @keyframes float-3 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(0, -6px); }
    }
    @keyframes pulse {
      0%, 100% { r: 3.5; opacity: 0.4; }
      50% { r: 6.5; opacity: 1; }
    }
    @keyframes flow {
      0% {
        cy: 110;
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        cy: 370;
        opacity: 0;
      }
    }
  </style>

  <!-- Frame Background -->
  <rect x="2" y="2" width="796" height="446" rx="24" fill="url(#bg-grad)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2"/>
  <rect x="2" y="2" width="796" height="446" rx="24" fill="url(#grid)"/>

  <!-- Glow effects behind funnel -->
  <circle cx="400" cy="230" r="120" fill="#8b5cf6" opacity="0.06" filter="blur(60px)" />
  <circle cx="400" cy="380" r="60" fill="#22d3a0" opacity="0.08" filter="blur(40px)" />

  <!-- Header -->
  <text x="400" y="45" text-anchor="middle" font-family="'Sora', 'system-ui', -apple-system, sans-serif" font-weight="800" font-size="22" fill="#ffffff" letter-spacing="1.5">THE MARKETING &amp; OPERATIONS FUNNEL</text>
  <text x="400" y="68" text-anchor="middle" font-family="'DM Sans', 'system-ui', -apple-system, sans-serif" font-weight="500" font-size="13" fill="rgba(240, 244, 255, 0.45)">Fusing Campaign Strategy with Automated SCM Execution</text>

  <!-- Flow Lines inside funnel -->
  <path d="M 400,105 L 400,365" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" />
  <path d="M 370,120 Q 400,230 395,350" stroke="rgba(255,255,255,0.06)" stroke-width="1.2" />
  <path d="M 430,120 Q 400,230 405,350" stroke="rgba(255,255,255,0.06)" stroke-width="1.2" />

  <path d="M 400,105 L 400,365" stroke="url(#purple-to-pink)" stroke-width="2" class="flow-line" opacity="0.5" />

  <!-- Flowing Particles -->
  <circle cx="400" cy="110" r="4" fill="#3b82f6" class="flow-particle" style="animation-delay: 0s; animation-duration: 2.5s;" />
  <circle cx="400" cy="110" r="5" fill="#8b5cf6" class="flow-particle" style="animation-delay: 0.8s; animation-duration: 2.2s;" />
  <circle cx="400" cy="110" r="3" fill="#ec4899" class="flow-particle" style="animation-delay: 1.6s; animation-duration: 2.8s;" />
  <circle cx="400" cy="110" r="4.5" fill="#22d3a0" class="flow-particle" style="animation-delay: 2.2s; animation-duration: 2.4s;" />

  <!-- Funnel Stage: AWARENESS (TOFU) -->
  <polygon points="280,100 520,100 490,180 310,180" stroke="url(#blue-to-purple)" class="funnel-stage" />
  <text x="400" y="145" text-anchor="middle" font-family="'Sora', 'system-ui', sans-serif" font-weight="700" font-size="15" fill="#ffffff" letter-spacing="1">AWARENESS (TOFU)</text>

  <!-- Funnel Stage: ENGAGEMENT (MOFU) -->
  <polygon points="310,185 490,185 460,265 340,265" stroke="url(#purple-to-pink)" class="funnel-stage" />
  <text x="400" y="230" text-anchor="middle" font-family="'Sora', 'system-ui', sans-serif" font-weight="700" font-size="15" fill="#ffffff" letter-spacing="1">ENGAGEMENT (MOFU)</text>

  <!-- Funnel Stage: CONVERSION (BOFU) -->
  <polygon points="340,270 460,270 420,350 380,350" stroke="url(#pink-to-green)" class="funnel-stage" />
  <text x="400" y="315" text-anchor="middle" font-family="'Sora', 'system-ui', sans-serif" font-weight="700" font-size="15" fill="#ffffff" letter-spacing="1">CONVERSION (BOFU)</text>

  <!-- Output Node -->
  <circle cx="400" cy="385" r="16" fill="rgba(34, 211, 160, 0.1)" stroke="#22d3a0" stroke-width="2" />
  <path d="M 395,385 L 399,389 L 405,381" stroke="#22d3a0" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  <text x="400" y="418" text-anchor="middle" font-family="'Sora', 'system-ui', sans-serif" font-weight="700" font-size="12" fill="#22d3a0" letter-spacing="0.5">CONVERSION ACHIEVED</text>

  <!-- Connectors -->
  <path d="M 540,140 L 485,140" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" class="connector" />
  <circle cx="485" cy="140" r="5" fill="#3b82f6" class="pulse-dot" />

  <path d="M 260,230 L 360,230" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" class="connector" />
  <circle cx="360" cy="230" r="5" fill="#8b5cf6" class="pulse-dot" />

  <path d="M 540,320 L 435,320" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" class="connector" />
  <circle cx="435" cy="320" r="5" fill="#ec4899" class="pulse-dot" />


  <!-- Card 1: TOFU Details (Right Side) -->
  <g class="floating-card-1">
    <!-- Card Frame -->
    <rect x="540" y="95" width="220" height="90" rx="14" fill="#080a14" stroke="rgba(59, 130, 246, 0.25)" stroke-width="1.5" class="card"/>
    <!-- Card Title -->
    <rect x="552" y="107" width="8" height="8" rx="2" fill="#3b82f6" />
    <text x="566" y="115" font-family="'Sora', sans-serif" font-weight="700" font-size="11" fill="rgba(240, 244, 255, 0.7)" letter-spacing="0.5">AWARENESS ENGINE</text>
    <!-- Card List Items -->
    <text x="552" y="137" font-family="'DM Sans', sans-serif" font-size="12" fill="#ffffff" font-weight="500">• 600+ Organic Followers</text>
    <text x="552" y="154" font-family="'DM Sans', sans-serif" font-size="12" fill="rgba(240, 244, 255, 0.65)">• +40% Reach via Canva AI</text>
    <text x="552" y="171" font-family="'DM Sans', sans-serif" font-size="11" fill="rgba(240, 244, 255, 0.45)">Founder's Feed Brand Scaling</text>
  </g>

  <!-- Card 2: MOFU Details (Left Side) -->
  <g class="floating-card-2">
    <!-- Card Frame -->
    <rect x="40" y="185" width="220" height="90" rx="14" fill="#080a14" stroke="rgba(139, 92, 246, 0.25)" stroke-width="1.5" class="card"/>
    <!-- Card Title -->
    <rect x="52" y="197" width="8" height="8" rx="2" fill="#8b5cf6" />
    <text x="66" y="205" font-family="'Sora', sans-serif" font-weight="700" font-size="11" fill="rgba(240, 244, 255, 0.7)" letter-spacing="0.5">ENGAGEMENT PIPELINE</text>
    <!-- Card List Items -->
    <text x="52" y="227" font-family="'DM Sans', sans-serif" font-size="12" fill="#ffffff" font-weight="500">• 25%+ Post Engagement</text>
    <text x="52" y="244" font-family="'DM Sans', sans-serif" font-size="12" fill="rgba(240, 244, 255, 0.65)">• Automated n8n Workflows</text>
    <text x="52" y="261" font-family="'DM Sans', sans-serif" font-size="11" fill="rgba(240, 244, 255, 0.45)">Claude-Augmented Code Logic</text>
  </g>

  <!-- Card 3: BOFU Details (Right Side) -->
  <g class="floating-card-3">
    <!-- Card Frame -->
    <rect x="540" y="275" width="220" height="90" rx="14" fill="#080a14" stroke="rgba(236, 72, 153, 0.25)" stroke-width="1.5" class="card"/>
    <!-- Card Title -->
    <rect x="552" y="287" width="8" height="8" rx="2" fill="#ec4899" />
    <text x="566" y="295" font-family="'Sora', sans-serif" font-weight="700" font-size="11" fill="rgba(240, 244, 255, 0.7)" letter-spacing="0.5">CONVERSION CORE</text>
    <!-- Card List Items -->
    <text x="552" y="317" font-family="'DM Sans', sans-serif" font-size="12" fill="#ffffff" font-weight="500">• Shipped Skope Platform</text>
    <text x="552" y="334" font-family="'DM Sans', sans-serif" font-size="12" fill="rgba(240, 244, 255, 0.65)">• Raised ₹15K+ NGO Funds</text>
    <text x="552" y="351" font-family="'DM Sans', sans-serif" font-size="11" fill="rgba(240, 244, 255, 0.45)">SAP MM Procure-to-Pay Intern</text>
  </g>

</svg>
